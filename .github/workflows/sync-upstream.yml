name: sync-upstream

# Fork da EngineeringGuild — sincroniza automaticamente com o upstream
# toda segunda 04:00 UTC (IDEA-011 / ops-247: toolkits externos sempre atualizados).
# Manual: Actions -> sync-upstream -> Run workflow.

on:
  schedule:
    - cron: "0 4 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Merge upstream default branch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api "repos/${{ github.repository }}/merge-upstream" \
            -f branch="${{ github.event.repository.default_branch || 'main' }}" \
            && echo "synced" || echo "::warning::merge-upstream falhou (conflito? checar manualmente)"
